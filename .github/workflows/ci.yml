name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, lint, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nmth_climate
      REDIS_URL: redis://localhost:6379
      API_PORT: "4000"
      WEB_PORT: "3000"
      WEB_ORIGIN: http://localhost:3000
      COOKIE_SECRET: ci-cookie-secret-placeholder
      JWT_SECRET: ci-jwt-secret-placeholder
      INGEST_API_TOKEN: ci-ingest-token-placeholder
      SERVER_API_BASE_URL: http://localhost:4000/api
      SERVER_HEALTH_URL: http://localhost:4000/health

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test
